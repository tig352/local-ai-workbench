<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local AI Workbench</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Local AI Workbench</p>
        <h1>本地 AI 模型工作台</h1>
      </div>
      <div class="header-actions">
        <span id="saveStatus" class="status-pill">本地保存</span>
        <button id="exportJsonBtn" type="button">導出 JSON</button>
        <button id="exportMarkdownBtn" type="button">導出 Markdown</button>
      </div>
    </header>

    <main class="workspace">
      <section class="panel config-panel" aria-labelledby="configTitle">
        <div class="panel-heading">
          <h2 id="configTitle">模型接口</h2>
          <button id="saveSettingsBtn" type="button">保存配置</button>
        </div>

        <form id="settingsForm" class="form-grid">
          <label>
            Provider
            <select id="provider">
              <option value="ollama">Ollama</option>
              <option value="openai-compatible">OpenAI compatible</option>
            </select>
          </label>
          <label>
            Endpoint
            <input id="endpoint" type="url" placeholder="http://localhost:11434" />
          </label>
          <label>
            模型列表
            <input id="models" type="text" placeholder="llama3.1, qwen2.5" />
          </label>
          <label>
            Temperature
            <input id="temperature" type="number" min="0" max="2" step="0.1" />
          </label>
          <label class="full-row">
            API Key
            <input id="apiKey" type="password" autocomplete="off" placeholder="只保存在當前頁面記憶體，不寫入 localStorage" />
          </label>
          <label class="full-row">
            System prompt
            <textarea id="systemPrompt" rows="3" placeholder="例如：你是一個謹慎、簡潔的中文技術助手。"></textarea>
          </label>
        </form>
      </section>

      <section class="panel prompt-panel" aria-labelledby="promptTitle">
        <div class="panel-heading">
          <h2 id="promptTitle">Prompt 測試集</h2>
          <div class="button-row">
            <button id="newPromptBtn" type="button">新建</button>
            <button id="savePromptBtn" type="button">保存</button>
            <button id="deletePromptBtn" type="button">刪除</button>
          </div>
        </div>

        <label>
          已保存 Prompt
          <select id="promptSelect"></select>
        </label>
        <label>
          名稱
          <input id="promptName" type="text" placeholder="例如：代碼解釋測試" />
        </label>
        <label>
          標籤
          <input id="promptTags" type="text" placeholder="code, summary, chinese" />
        </label>
        <label>
          Prompt
          <textarea id="promptText" rows="12" placeholder="輸入要測試的 prompt"></textarea>
        </label>
        <button id="runBtn" class="primary-action" type="button">執行模型測試</button>
      </section>

      <section class="panel results-panel" aria-labelledby="resultsTitle">
        <div class="panel-heading">
          <h2 id="resultsTitle">測試記錄</h2>
          <button id="clearRunsBtn" type="button">清空記錄</button>
        </div>
        <div id="runSummary" class="summary-grid"></div>
        <div id="resultsList" class="results-list" aria-live="polite"></div>
      </section>
    </main>

    <template id="resultTemplate">
      <article class="result-item">
        <div class="result-meta">
          <strong class="result-model"></strong>
          <span class="result-provider"></span>
          <span class="result-latency"></span>
          <span class="result-status"></span>
        </div>
        <pre class="result-output"></pre>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
